<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMDTRIO - Input</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap');

        :root {
            --neon: #00ffff;
            --glass: rgba(10, 20, 30, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #05050a;
            color: white;
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        header {
            display: flex;
            justify-content: space-between;
            padding: 25px 30px;
            max-width: 1400px;
            margin: 0 auto;
            align-items: center;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon);
            font-size: 24px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .nav-item {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            color: white;
            text-decoration: none;
            position: relative;
            padding-bottom: 5px;
            margin-left: 25px;
        }

        .nav-item.active {
            color: var(--neon);
            border-bottom: 2px solid var(--neon);
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 30px;
            align-items: center;
        }

        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        .hero span {
            color: var(--neon);
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
        }

        textarea {
            width: 100%;
            height: 180px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            padding: 15px;
            margin-bottom: 20px;
            resize: none;
        }

        textarea:focus {
            outline: none;
            border-color: var(--neon);
        }

        .algo-sel {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .algo-sel label {
            border: 1px solid #444;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Orbitron';
            font-size: 12px;
            transition: 0.3s;
        }

        .algo-sel input {
            display: none;
        }

        .algo-sel input:checked+span {
            color: var(--neon);
        }

        .algo-sel label:has(input:checked) {
            border-color: var(--neon);
            background: rgba(0, 255, 255, 0.1);
        }

        .btn {
            width: 100%;
            padding: 18px;
            background: transparent;
            border: 2px solid var(--neon);
            color: var(--neon);
            font-family: 'Orbitron';
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.4s;
        }

        .btn:hover {
            background: var(--neon);
            color: black;
            box-shadow: 0 0 20px var(--neon);
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .hero h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>

<body>
    <canvas id="bg-canvas"></canvas>
    <header>
        <div class="logo">SMDTRIO</div>
        <nav>
            <a href="#" class="nav-item active">WEB APP</a>
        </nav>
    </header>
    <div class="container">
        <div class="hero">
            <h1>SPAM<br><span>DETECTOR</span></h1>
            <p style="color: #888; margin-top: 15px;">Advanced SMS analysis using dual-engine neural filtering. Instant
                results with 99% accuracy.</p>
        </div>
        <div class="card">
            <form action="/result/" method="POST">
                {% csrf_token %}
                <textarea name="rawtext" placeholder="Enter message text here..." required></textarea>
                <div class="algo-sel">
                    <label><input type="radio" name="algo" value="1" checked><span>ALGO_01</span></label>
                    <label><input type="radio" name="algo" value="2"><span>ALGO_02</span></label>
                    <label><input type="radio" name="algo" value="3"><span>AI</span></label>
                </div>
                <button type="submit" class="btn">INITIALIZE SCAN</button>
            </form>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = [];
            let count = window.innerWidth < 768 ? 50 : 100;
            for (let i = 0; i < count; i++) particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5 });
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = ctx.strokeStyle = "#00ffff";
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1; if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.globalAlpha = 0.5; ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2); ctx.fill();
                for (let j = i + 1; j < particles.length; j++) {
                    let d = Math.hypot(p.x - particles[j].x, p.y - particles[j].y);
                    if (d < 150) { ctx.globalAlpha = (1 - d / 150) * 0.2; ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke(); }
                }
            });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', init); init(); animate();
    </script>
</body>

</html>
